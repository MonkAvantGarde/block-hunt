specVersion: 0.0.5
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: BlockHuntToken
    network: base-sepolia
    source:
      address: "0x5A5335f138950C127Dc9baaA2618e89ADEce09aC"
      abi: BlockHuntToken
      startBlock: 38860000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Player
        - PlayerActivity
        - SeasonStat
      abis:
        - name: BlockHuntToken
          file: BlockHuntToken/abis/BlockHuntToken.json
      eventHandlers:
        - event: TransferSingle(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleTransferSingle
        - event: TransferBatch(indexed address,indexed address,indexed address,uint256[],uint256[])
          handler: handleTransferBatch
        - event: MintFulfilled(indexed address,indexed uint256,uint256)
          handler: handleMintFulfilled
        - event: BlocksCombined(indexed address,indexed uint256,indexed uint256)
          handler: handleBlocksCombined
        - event: BlocksForged(indexed address,indexed uint256,bool)
          handler: handleBlocksForged
      file: BlockHuntToken/BlockHuntToken.wasm
