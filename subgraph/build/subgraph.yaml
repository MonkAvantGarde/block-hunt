specVersion: 0.0.5
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: BlockHuntToken
    network: base-sepolia
    source:
      address: "0x541a85733d98F720A3b7C15f2fdc2f157599B9dc"
      abi: BlockHuntToken
      startBlock: 39171240
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Player
        - PlayerActivity
        - SeasonStat
      abis:
        - name: BlockHuntToken
          file: BlockHuntToken/BlockHuntToken.json
      eventHandlers:
        - event: TransferSingle(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleTransferSingle
        - event: TransferBatch(indexed address,indexed address,indexed address,uint256[],uint256[])
          handler: handleTransferBatch
        - event: MintFulfilled(indexed address,indexed uint256,uint256)
          handler: handleMintFulfilled
        - event: BlocksCombined(indexed address,indexed uint256,indexed uint256)
          handler: handleBlocksCombined
        - event: BlocksForged(indexed address,indexed uint256,bool)
          handler: handleBlocksForged
      file: BlockHuntToken/BlockHuntToken.wasm
  - kind: ethereum
    name: BlockHuntForge
    network: base-sepolia
    source:
      address: "0xCCFcadA80ba90fe305DD60A1b6374F8b53e86c55"
      abi: BlockHuntForge
      startBlock: 39171240
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - ForgeRequest
        - Player
      abis:
        - name: BlockHuntForge
          file: BlockHuntForge/BlockHuntForge.json
      eventHandlers:
        - event: ForgeRequested(indexed uint256,indexed address,uint256,uint256)
          handler: handleForgeRequested
        - event: ForgeResolved(indexed uint256,indexed address,uint256,bool)
          handler: handleForgeResolved
      file: BlockHuntForge/BlockHuntForge.wasm
  - kind: ethereum
    name: BlockHuntRewards
    network: base-sepolia
    source:
      address: "0x834CEf549b311233b99D1a1fc46CDa2C87C0317B"
      abi: BlockHuntRewards
      startBlock: 39171240
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - DailyDraw
        - BatchFirst
        - BatchBounty
        - BatchRewardConfig
        - Player
      abis:
        - name: BlockHuntRewards
          file: BlockHuntRewards/BlockHuntRewards.json
      eventHandlers:
        - event: DailyDrawResolved(indexed uint256,indexed address,uint256)
          handler: handleDailyDrawResolved
        - event: DailyPrizeClaimed(indexed uint256,indexed address,uint256)
          handler: handleDailyPrizeClaimed
        - event: BatchFirstAwarded(indexed uint256,indexed uint256,indexed address,uint256)
          handler: handleBatchFirstAwarded
        - event: BatchFirstClaimed(indexed uint256,indexed uint256,indexed address,uint256)
          handler: handleBatchFirstClaimed
        - event: BatchBountySet(indexed uint256,uint256,uint256)
          handler: handleBatchBountySet
        - event: BatchBountyClaimed(indexed uint256,indexed address,uint256)
          handler: handleBatchBountyClaimed
        - event: BatchFunded(indexed uint256,uint256)
          handler: handleBatchFunded
      file: BlockHuntRewards/BlockHuntRewards.wasm
