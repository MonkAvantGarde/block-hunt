type Player @entity(immutable: false) {
  id: ID!          # lowercase wallet address
  address: Bytes!

  # Live balances per tier
  tier1Balance: BigInt!
  tier2Balance: BigInt!
  tier3Balance: BigInt!
  tier4Balance: BigInt!
  tier5Balance: BigInt!
  tier6Balance: BigInt!
  tier7Balance: BigInt!

  # Derived — recalculated on every event
  tiersUnlocked: Int!        # count of tiers 2–7 where balance > 0
  totalMints: BigInt!        # blocks received from VRF (MintFulfilled)
  totalCombines: BigInt!     # combine actions (BlocksCombined)
  totalForges: BigInt!       # forge attempts (BlocksForged)
  totalForgeSuccesses: BigInt!  # successful forges
  progressionScore: BigInt!  # weighted score used for leaderboard ranking

  lastUpdated: BigInt!

  # Reverse lookups
  activities: [PlayerActivity!]! @derivedFrom(field: "player")
  forgeRequests: [ForgeRequest!]! @derivedFrom(field: "player")
  tierBountyWins: [TierBounty!]! @derivedFrom(field: "winner")
  lotteryWins: [LotteryDraw!]! @derivedFrom(field: "winner")
  streakClaims: [StreakClaim!]! @derivedFrom(field: "player")
  referralsClaimed: [ReferralClaim!]! @derivedFrom(field: "referrer")
}

# One entity per player per UTC day — used for streak calculation
type PlayerActivity @entity(immutable: false) {
  id: ID!                  # "{playerAddress}-{YYYY-MM-DD}"
  player: Player!
  date: String!            # "YYYY-MM-DD" UTC
  timestamp: BigInt!       # first activity timestamp that day
  hasMint: Boolean!
  hasCombine: Boolean!
  hasForge: Boolean!
}

# Singleton — always id = "season-1"
type SeasonStat @entity(immutable: false) {
  id: ID!
  totalMinted: BigInt!
  totalBurned: BigInt!
  uniquePlayers: Int!
}

# ── Forge tracking ─────────────────────────────────────────────────────────

type ForgeRequest @entity(immutable: false) {
  id: ID!                    # "{requestId}"
  requestId: BigInt!
  player: Player!
  fromTier: Int!
  burnCount: BigInt!
  resolved: Boolean!
  success: Boolean
  createdAt: BigInt!
  resolvedAt: BigInt
}

# ── Rewards v2 tracking ───────────────────────────────────────────────────

type TierBounty @entity(immutable: false) {
  id: ID!                    # "{season}-{batch}-{tier}"
  season: BigInt!
  batch: Int!
  tier: Int!
  winner: Player!
  amount: BigInt!
  claimed: Boolean!
  wonAt: BigInt!
}

type LotteryDraw @entity(immutable: false) {
  id: ID!                    # "lottery-{season}-{day}"
  season: BigInt!
  day: Int!
  winner: Player!
  amount: BigInt!
  distributedAt: BigInt!
}

type StreakClaim @entity(immutable: true) {
  id: ID!                    # "{tx}-{logIndex}"
  season: BigInt!
  player: Player!
  milestoneIndex: Int!
  blocksRewarded: Int!
  claimedAt: BigInt!
}

type ReferralClaim @entity(immutable: true) {
  id: ID!                    # "{tx}-{logIndex}"
  referrer: Player!
  referee: Player!
  amount: BigInt!
  claimedAt: BigInt!
}

type ReferralLink @entity(immutable: true) {
  id: ID!                    # referee address
  referee: Player!
  referrer: Player!
  linkedAt: BigInt!
}
