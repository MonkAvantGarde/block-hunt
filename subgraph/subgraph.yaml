specVersion: 0.0.5
schema:
  file: ./schema.graphql

dataSources:
  # ── BlockHuntToken (v2.1) ──────────────────────────────────────────────────
  - kind: ethereum
    name: BlockHuntToken
    network: base-sepolia
    source:
      address: "0x1fC1eB28757BBD9B09F3E23628492359fA9B6400"
      abi: BlockHuntToken
      startBlock: 40510000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Player
        - PlayerActivity
        - SeasonStat
      abis:
        - name: BlockHuntToken
          file: ./abis/BlockHuntToken.json
      eventHandlers:
        - event: TransferSingle(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleTransferSingle
        - event: TransferBatch(indexed address,indexed address,indexed address,uint256[],uint256[])
          handler: handleTransferBatch
        - event: MintFulfilled(indexed address,indexed uint256,uint256)
          handler: handleMintFulfilled
        - event: BlocksCombined(indexed address,indexed uint256,indexed uint256)
          handler: handleBlocksCombined
        - event: BlocksForged(indexed address,indexed uint256,bool)
          handler: handleBlocksForged
      file: ./src/mapping.ts

  # ── BlockHuntForge (v2.1) ──────────────────────────────────────────────────
  - kind: ethereum
    name: BlockHuntForge
    network: base-sepolia
    source:
      address: "0xCF0D067E00bC58f02834f8fCF497694a9ffe158B"
      abi: BlockHuntForge
      startBlock: 40510000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - ForgeRequest
        - Player
      abis:
        - name: BlockHuntForge
          file: ./abis/BlockHuntForge.json
      eventHandlers:
        - event: ForgeRequested(indexed uint256,indexed address,uint256,uint256)
          handler: handleForgeRequested
        - event: ForgeResolved(indexed uint256,indexed address,uint256,bool)
          handler: handleForgeResolved
      file: ./src/forge-mapping.ts

  # ── BlockHuntRewards v2 ─────────────────────────────────────────────────────
  - kind: ethereum
    name: BlockHuntRewards
    network: base-sepolia
    source:
      address: "0x4f04885785c3a9F13314a207eDfC403b2D430eb3"
      abi: BlockHuntRewards
      startBlock: 40510000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TierBounty
        - LotteryDraw
        - StreakClaim
        - ReferralClaim
        - Player
      abis:
        - name: BlockHuntRewards
          file: ./abis/BlockHuntRewards.json
      eventHandlers:
        - event: TierBountyWon(uint256,uint8,uint8,indexed address)
          handler: handleTierBountyWon
        - event: TierBountyClaimed(uint256,uint8,uint8,indexed address,uint256)
          handler: handleTierBountyClaimed
        - event: LotteryDistributed(uint256,uint32,indexed address,uint256)
          handler: handleLotteryDistributed
        - event: StreakClaimed(uint256,indexed address,uint8,uint16)
          handler: handleStreakClaimed
        - event: ReferrerLinked(indexed address,indexed address)
          handler: handleReferrerLinked
        - event: ReferralClaimed(indexed address,indexed address,uint256)
          handler: handleReferralClaimed
      file: ./src/rewards-mapping.ts
