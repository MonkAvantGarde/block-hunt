specVersion: 0.0.5
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum
    name: BlockHuntToken
    network: base-sepolia
    source:
      address: "0x23A15aE0bF86B1227614A1175A1D3A12f8FA747b"
      abi: BlockHuntToken
      # Deployment block from Phase 2 redeploy (March 12, 2026)
      # Confirmed from deploy tx on Base Sepolia block 38777682
      startBlock: 38777682
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Player
        - SeasonStat
      abis:
        - name: BlockHuntToken
          file: ./abis/BlockHuntToken.json
      eventHandlers:
        - event: TransferSingle(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleTransferSingle
        - event: TransferBatch(indexed address,indexed address,indexed address,uint256[],uint256[])
          handler: handleTransferBatch
        - event: MintFulfilled(indexed address,indexed uint256,uint256)
          handler: handleMintFulfilled
      file: ./src/mapping.ts
