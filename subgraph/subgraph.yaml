specVersion: 0.0.5
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum
    name: BlockHuntToken
    network: base-sepolia
    source:
      address: "0x57Efa000E28313ed47213C6faF13719500038D75"
      abi: BlockHuntToken
      # ⚠️  Replace with the actual deployment block from BaseScan:
      # 1. Go to https://sepolia.basescan.org/address/0x57Efa000E28313ed47213C6faF13719500038D75
      # 2. Click the first transaction — that block number goes here
      # Using 0 works but will take much longer to sync on first deploy
      startBlock: 38420065
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Player
        - SeasonStat
      abis:
        - name: BlockHuntToken
          file: ./abis/BlockHuntToken.json
      eventHandlers:
        - event: TransferSingle(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleTransferSingle
        - event: MintFulfilled(indexed uint256,indexed address,uint256)
          handler: handleMintFulfilled
      file: ./src/mapping.ts
