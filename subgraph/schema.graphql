type Player @entity {
  id: ID!          # lowercase wallet address
  address: Bytes!

  # Live balances per tier
  tier1Balance: BigInt!
  tier2Balance: BigInt!
  tier3Balance: BigInt!
  tier4Balance: BigInt!
  tier5Balance: BigInt!
  tier6Balance: BigInt!
  tier7Balance: BigInt!

  # Derived — recalculated on every event
  tiersUnlocked: Int!        # count of tiers 2–7 where balance > 0
  totalMints: BigInt!        # blocks received from VRF (MintFulfilled)
  totalCombines: BigInt!     # combine actions (BlocksCombined)
  totalForges: BigInt!       # forge attempts (BlocksForged)
  totalForgeSuccesses: BigInt!  # successful forges
  progressionScore: BigInt!  # weighted score used for leaderboard ranking

  lastUpdated: BigInt!

  # Reverse lookups
  activities: [PlayerActivity!]! @derivedFrom(field: "player")
  forgeRequests: [ForgeRequest!]! @derivedFrom(field: "player")
  dailyDrawWins: [DailyDraw!]! @derivedFrom(field: "winner")
  batchFirstWins: [BatchFirst!]! @derivedFrom(field: "winner")
}

# One entity per player per UTC day — used for streak calculation
type PlayerActivity @entity {
  id: ID!                  # "{playerAddress}-{YYYY-MM-DD}"
  player: Player!
  date: String!            # "YYYY-MM-DD" UTC
  timestamp: BigInt!       # first activity timestamp that day
  hasMint: Boolean!
  hasCombine: Boolean!
  hasForge: Boolean!
}

# Singleton — always id = "season-1"
type SeasonStat @entity {
  id: ID!
  totalMinted: BigInt!
  totalBurned: BigInt!
  uniquePlayers: Int!
}

# ── Forge tracking ─────────────────────────────────────────────────────────

type ForgeRequest @entity {
  id: ID!                    # "{requestId}"
  requestId: BigInt!
  player: Player!
  fromTier: Int!
  burnCount: BigInt!
  resolved: Boolean!
  success: Boolean
  createdAt: BigInt!
  resolvedAt: BigInt
}

# ── Rewards tracking ──────────────────────────────────────────────────────

type DailyDraw @entity {
  id: ID!                    # "draw-{day}"
  day: BigInt!
  winner: Player!
  prize: BigInt!
  resolvedAt: BigInt!
  claimed: Boolean!
  claimedAmount: BigInt
}

type BatchFirst @entity {
  id: ID!                    # "{batch}-{achievementId}"
  batch: Int!
  achievementId: Int!
  winner: Player!
  prize: BigInt!
  awardedAt: BigInt!
  claimed: Boolean!
  claimedAmount: BigInt
}

type BatchBounty @entity {
  id: ID!                    # "bounty-{batch}"
  batch: Int!
  totalRecipients: BigInt!
  perWalletShare: BigInt!
  setAt: BigInt!
  distributed: Boolean!
}

type BatchRewardConfig @entity {
  id: ID!                    # "config-{batch}"
  batch: Int!
  totalDeposit: BigInt!
  active: Boolean!
}
